version: 2

models:
  - name: stg_events
    description: "Cleaned raw e-commerce events"
    columns:
      - name: event_id
        description: "Unique event identifier"
        tests:
          - unique
          - not_null
      - name: event_type
        description: "Type of event"
        tests:
          - not_null
          - accepted_values:
              values: ['page_view', 'product_view', 'add_to_cart',
                      'remove_from_cart', 'checkout_start', 'purchase']

  - name: stg_purchases
    description: "Purchase events only"
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: revenue
        tests:
          - not_null

  - name: revenue_by_category
    description: "Revenue aggregated by product category"

  - name: conversion_funnel
    description: "Full conversion funnel metrics"

  - name: top_products
    description: "Top 10 products by revenue"

  - name: user_segments
    description: "User segmentation by spend"