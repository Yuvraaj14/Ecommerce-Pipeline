ecommerce_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('SUPABASE_HOST', 'localhost') }}"
      port: 5432
      user: "{{ env_var('SUPABASE_USER', 'postgres') }}"
      password: "{{ env_var('SUPABASE_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('SUPABASE_DB', 'postgres') }}"
      schema: analytics
      threads: 4