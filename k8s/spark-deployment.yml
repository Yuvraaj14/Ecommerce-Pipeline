apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-streaming
  labels:
    app: spark-streaming
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-streaming
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: spark-streaming
    spec:
      containers:
      - name: spark-streaming
        image: yuvraaj14/ecommerce-pipeline:latest
        command: ["python", "spark/streaming_job_simple.py"]
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: pipeline-secrets
              key: redis-url
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command: ["python", "-c", "import redis; r=redis.from_url('redis://redis:6379'); r.ping()"]
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: spark-streaming
spec:
  selector:
    app: spark-streaming
  ports:
  - port: 4040
    targetPort: 4040